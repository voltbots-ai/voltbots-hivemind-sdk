[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "voltbots"
version = "0.1.0"
description = "Python SDK for the VoltBots Hivemind API"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
  "httpx>=0.27",
  "pydantic>=2.0",
]
keywords = ["voltbots", "hivemind", "ai", "mistakes", "code-review"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Software Development :: Libraries",
]

[project.optional-dependencies]
dev = [
  "pytest>=8",
  "pytest-asyncio>=0.23",
  "respx>=0.21",
]

[project.urls]
Homepage = "https://voltbots.com"
Repository = "https://github.com/voltbots/voltbots-hivemind-sdk"

[tool.hatch.build.targets.wheel]
packages = ["src/voltbots"]
